<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmark Saver</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Bookmark Saver</h1>
      <form type="submit" id="bookform">
        <input type="text" id="bookmark-name" placeholder="Bookmark Name" />
        <input type="text" id="bookmark-url" placeholder="Bookmark URL" />
        <button id="bookmark-btn">Add Bookmark</button>
      </form>
      <ul class="bookmark-list" id="bookmark-list"></ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
